<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bazzi Store</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:white;
position:sticky;
top:0;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.logo{
font-weight:bold;
font-size:22px;
}

#cart{
background:white;
margin:15px;
padding:15px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
padding:20px;
}

.card{
background:white;
padding:10px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
border-radius:10px;
}

button{
background:linear-gradient(45deg,#111,#444);
color:white;
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
}

footer{
text-align:center;
padding:30px;
background:#111;
color:white;
margin-top:30px;
}
</style>
</head>

<body>

<header>
<div class="logo">Bazzi Store</div>
</header>

<!-- 🛒 CART -->
<div id="cart">
<h2>🛒 سلة المشتريات</h2>
<div id="cartItems"></div>
<h3 id="total">المجموع: 0$</h3>
<button onclick="checkout()">إتمام الطلب</button>
</div>

<!-- PRODUCTS -->
<section class="products" id="products"></section>

<!-- BOX -->
<div id="box" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.5);justify-content:center;align-items:center;">

<div style="background:white;padding:20px;width:300px">
<h3>إتمام الطلب</h3>
<input id="name" placeholder="الاسم"><br><br>
<input id="phone" placeholder="الرقم"><br><br>
<button onclick="confirm()">تأكيد</button>
<button onclick="closeBox()">إلغاء</button>
</div>

</div>

<script>

/* 🟢 المنتجات */
let data = [
{name:"T-Shirt",price:10,img:"https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=600"},
{name:"Jacket",price:25,img:"https://images.unsplash.com/photo-1551028719-00167b16eac5?w=600"},
{name:"Jeans",price:20,img:"https://images.unsplash.com/photo-1542272604-787c3835535d?w=600"}
];

let cart = [];
let total = 0;

/* 🟢 عرض المنتجات */
function show(){
let container = document.getElementById("products");
container.innerHTML = "";

data.forEach(p=>{
container.innerHTML += `
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<p>${p.price}$</p>
<button onclick="addToCart('${p.name}',${p.price})">🛒 أضف للسلة</button>
</div>
`;
});
}

/* 🟢 إضافة للسلة */
function addToCart(name,price){
cart.push({name,price});
total += price;
renderCart();
}

/* 🟢 عرض السلة */
function renderCart(){
let box = document.getElementById("cartItems");
box.innerHTML = "";

cart.forEach(p=>{
box.innerHTML += `<p>${p.name} - ${p.price}$</p>`;
});

document.getElementById("total").innerText = "المجموع: " + total + "$";
}

/* 🟢 checkout */
function checkout(){
if(cart.length == 0){
alert("السلة فارغة");
return;
}
openBox();
}

/* 🟢 box */
function openBox(){
document.getElementById("box").style.display="flex";
}

function closeBox(){
document.getElementById("box").style.display="none";
}

/* 🟢 تأكيد الطلب + واتساب */
function confirm(){

let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;

if(name=="" || phone==""){
alert("عبي البيانات");
return;
}

let msg = "طلب جديد:%0A";
msg += "الاسم: " + name + "%0A";
msg += "الرقم: " + phone + "%0A";
msg += "الطلب:%0A";

cart.forEach(p=>{
msg += "- " + p.name + " (" + p.price + "$)%0A";
});

msg += "المجموع: " + total + "$";

window.open("https://wa.me/96181812571?text=" + msg, "_blank");

cart = [];
total = 0;
renderCart();
closeBox();
}

/* 🟢 تشغيل */
show();
  function login(){
let pass = document.getElementById("pass").value;

if(pass === "1234"){
window.location.href = "panel.html";
}else{
alert("كلمة السر غلط ❌");
}
}

</script>

<footer>
<p>📞 961 81 812 571</p>
<p>📍 Lebanon</p>
</footer>

<a href="https://wa.me/96181812571" target="_blank"
style="position:fixed;bottom:20px;left:20px;
background:#25D366;color:white;padding:15px;
border-radius:50%;font-size:22px;text-decoration:none;">
💬
</a>

</body>
</html>
