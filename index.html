<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bazzi Store</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:white;
position:sticky;
top:0;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.logo{
font-weight:bold;
font-size:22px;
}

#cart{
background:white;
margin:15px;
padding:15px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
padding:20px;
}

.card{
background:white;
padding:10px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
border-radius:10px;
}

button{
background:linear-gradient(45deg,#111,#444);
color:white;
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
}

footer{
text-align:center;
padding:30px;
background:#111;
color:white;
margin-top:30px;
}
</style>
</head>

<body>

<header>
  <section style="
margin:15px;
padding:50px 20px;
text-align:center;
border-radius:20px;
color:white;
background:linear-gradient(135deg,#111,#444);
box-shadow:0 10px 25px rgba(0,0,0,0.2);
">

<h1 style="font-size:40px;margin:0;">
Bazzi Store
</h1>
<div class="logo">Bazzi Store</div>
</header>
  <section style="
margin:15px;
padding:50px 20px;
text-align:center;
border-radius:20px;
color:white;
background:linear-gradient(135deg,#111,#444);
box-shadow:0 10px 25px rgba(0,0,0,0.2);
">

<h1 style="font-size:40px;margin:0;">
Bazzi Store
</h1>

<p style="margin-top:10px;font-size:18px;">
أحدث صيحات الموضة بأسعار مميزة 🔥
</p>

<button style="
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:10px;
background:white;
color:black;
font-weight:bold;
cursor:pointer;
">
تسوق الآن
</button>

</section>

<!-- 🛒 CART -->
<div id="cart">
<h2>🛒 سلة المشتريات</h2>
<div id="cartItems"></div>
<h3 id="total">المجموع: 0$</h3>
<button onclick="checkout()">إتمام الطلب</button>
</div>

<!-- PRODUCTS -->
<section class="products" id="products"></section>

<!-- BOX -->
<div id="box" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.5);justify-content:center;align-items:center;">

<div style="background:white;padding:20px;width:300px">
<h3>إتمام الطلب</h3>
<input id="name" placeholder="الاسم"><br><br>
<input id="phone" placeholder="الرقم"><br><br>
<button onclick="confirm()">تأكيد</button>
<button onclick="closeBox()">إلغاء</button>
</div>

</div>

<script>

// منتجات
const data = [
{name:"T-Shirt",price:10,img:"https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=600"},
{name:"Jacket",price:25,img:"https://images.unsplash.com/photo-1551028719-00167b16eac5?w=600"},
{name:"Jeans",price:20,img:"https://images.unsplash.com/photo-1542272604-787c3835535d?w=600"}
];

let cart=[];
let total=0;

// عرض المنتجات
function show(){
let container=document.getElementById("products");
container.innerHTML="";

data.forEach(p=>{
container.innerHTML+=`
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<p>${p.price}$</p>
<button onclick="addToCart('${p.name}',${p.price})">🛒 أضف للسلة</button>
<button onclick="buyNow('${p.name}',${p.price})">شراء مباشر</button>
</div>
`;
});
}

// إضافة للسلة
function addToCart(name,price){
cart.push({name,price});
total+=price;
renderCart();
}

// عرض السلة
function renderCart(){
let box=document.getElementById("cartItems");
box.innerHTML="";

cart.forEach(p=>{
box.innerHTML+=`<p>${p.name} - ${p.price}$</p>`;
});

document.getElementById("total").innerText="المجموع: "+total+"$";
}

// checkout
function checkout(){
if(cart.length==0){
alert("السلة فارغة");
return;
}
openBox();
}

// box
function openBox(){
document.getElementById("box").style.display="flex";
}

function closeBox(){
document.getElementById("box").style.display="none";
}

function confirm(){
alert("تم الطلب بنجاح 🎉");
cart=[];
total=0;
renderCart();
closeBox();
}

show();
  function buyNow(name, price){
openBox();
document.getElementById("name").value = "";
document.getElementById("phone").value = "";

alert("سيتم طلب: " + name + " بسعر " + price + "$");
}

</script>
  <footer id="contact" style="text-align:center;padding:30px;background:#111;color:white;margin-top:30px;">
  <p>📞 961 81 812 571</p>
  <p>📍 Lebanon</p>
</footer>

style="position:fixed;bottom:20px;left:20px;
background:#25D366;color:white;padding:15px;
border-radius:50%;font-size:22px;text-decoration:none;">
💬
</a>

</body>
</html>
