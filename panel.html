<!DOCTYPE html><html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>
</head>
<body><h2>🛠 لوحة التحكم</h2><input id="name" placeholder="اسم المنتج">
<input id="price" placeholder="السعر">
<input id="img" placeholder="رابط الصورة"><button onclick="addProduct()">إضافة منتج</button>

<div id="products"></div><script>

function getProducts(){
return JSON.parse(localStorage.getItem("products")) || [];
}

function saveProducts(data){
localStorage.setItem("products",JSON.stringify(data));
}

function addProduct(){

let data = getProducts();

data.push({
name:document.getElementById("name").value,
price:Number(document.getElementById("price").value),
img:document.getElementById("img").value,
likes:0,
rating:0
});

saveProducts(data);
showProducts();
}

function deleteProduct(i){

let data = getProducts();

data.splice(i,1);

saveProducts(data);
showProducts();
}

function showProducts(){

let data = getProducts();

let box = document.getElementById("products");
box.innerHTML="";

data.forEach((p,i)=>{

box.innerHTML += `
<div>
<h3>${p.name}</h3>
<p>${p.price}$</p>
<button onclick="deleteProduct(${i})">🗑️ حذف</button>
</div>
<hr>
`;

});

}

showProducts();

</script></body>
</html>
