<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Panel</title>
</head>
<body>

<h2>🛠 إضافة منتج</h2>

<input id="name" placeholder="اسم المنتج">
<input id="price" placeholder="السعر">
<input id="img" placeholder="رابط الصورة">

<button onclick="add()">إضافة</button>

<h3>المنتجات</h3>
<div id="list"></div>

<script>

function getData(){
return JSON.parse(localStorage.getItem("products")) || [];
}

function save(data){
localStorage.setItem("products",JSON.stringify(data));
}

function add(){

let data = getData();

data.push({
name:document.getElementById("name").value,
price:document.getElementById("price").value,
img:document.getElementById("img").value
});

save(data);
show();

}

function deleteItem(i){
let data = getData();
data.splice(i,1);
save(data);
show();
}

function show(){

let data = getData();
let box = document.getElementById("list");
box.innerHTML = "";

data.forEach((p,i)=>{
box.innerHTML += `
<div>
<h4>${p.name}</h4>
<button onclick="deleteItem(${i})">🗑️ حذف</button>
</div>
`;
});

}

show();

</script>

</body>
</html>
