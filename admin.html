<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<style>
body{font-family:Arial;background:#f4f4f4;margin:0;padding:20px}
input,button{padding:10px;width:100%;margin:5px 0}
button{background:black;color:white;border:none;border-radius:8px}
</style>
</head>

<body>

<h2>🛠 لوحة التحكم</h2>

<input id="name" Nike Shirt="اسم المنتج">
<input id="price" 15="السعر">
<input id="img" https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=600="رابط الصورة">

<button onclick="addProduct()">إضافة المنتج</button>

<script>

function addProduct(){

let name = document.getElementById("name").value;
let price = document.getElementById("price").value;
let img = document.getElementById("img").value;

if(!name || !price || !img){
alert("عبي كل الحقول");
return;
}

let products = JSON.parse(localStorage.getItem("products")) || [];

products.push({name,price,img});

localStorage.setItem("products", JSON.stringify(products));

alert("تمت الإضافة 🎉");

}

</script>

</body>
</html>
