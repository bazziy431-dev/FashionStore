<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Login</title>
</head>
<body>

<h2>🔐 Admin Login</h2>

<input type="password" id="pass" placeholder="كلمة السر">
<button onclick="login()">دخول</button>

<script>
function login(){
let pass = document.getElementById("pass").value;

if(pass === "1234"){
window.location.href = "panel.html";
}else{
alert("غلط");
}
}
</script>

</body>
</html>
